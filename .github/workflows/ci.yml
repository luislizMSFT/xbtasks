name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Install Wails system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Go vet
        run: go vet ./internal/... ./pkg/... ./domain/...

      - name: Generate Wails bindings
        run: wails3 generate bindings -f '-tags production' -clean=true -ts

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend type check
        working-directory: frontend
        run: npx vue-tsc --noEmit
