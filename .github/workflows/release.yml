name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Build production binary
        run: task windows:build

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: team-ado-tool-windows
          path: bin/team-ado-tool.exe
          if-no-files-found: error

  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Build .app bundle
        run: task darwin:package
        env:
          GOARCH: ${{ matrix.arch }}

      - name: Zip .app bundle
        run: cd bin && zip -r team-ado-tool-macos-${{ matrix.arch }}.zip team-ado-tool.app

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: team-ado-tool-macos-${{ matrix.arch }}
          path: bin/team-ado-tool-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mv artifacts/team-ado-tool-windows/team-ado-tool.exe artifacts/team-ado-tool-windows.exe
          mv artifacts/team-ado-tool-macos-arm64/team-ado-tool-macos-arm64.zip artifacts/team-ado-tool-macos-arm64.zip
          mv artifacts/team-ado-tool-macos-amd64/team-ado-tool-macos-amd64.zip artifacts/team-ado-tool-macos-amd64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/team-ado-tool-windows.exe
            artifacts/team-ado-tool-macos-arm64.zip
            artifacts/team-ado-tool-macos-amd64.zip
